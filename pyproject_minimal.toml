[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "japanese-programming"
version = "2.0.0"
description = "Japanese Programming Language Module - Program in natural Japanese syntax"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Japanese Programming Developer", email = "dev@example.com"}
]
maintainers = [
    {name = "Japanese Programming Developer", email = "dev@example.com"}
]
keywords = ["japanese", "programming", "education", "beginner", "natural-language"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Education",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: Education",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Programming Languages :: Python",
]
requires-python = ">=3.8"
dependencies = [
    # No external dependencies for basic functionality
]

[project.urls]
Homepage = "https://github.com/developer/japanese-programming"
Documentation = "https://github.com/developer/japanese-programming/blob/main/README.md"
Repository = "https://github.com/developer/japanese-programming"
"Bug Tracker" = "https://github.com/developer/japanese-programming/issues"

[project.optional-dependencies]
dev = [
    "pytest>=6.0",
    "black>=21.0",
    "flake8>=3.8",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["*"]

[tool.black]
line-length = 88
target-version = ['py38']

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
